<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGE Intelligence System | Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg-dark: #0b0f1a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, var(--bg-dark) 80%);
            z-index: -1;
        }

        .container { 
            max-width: 1100px; margin: 0 auto; 
            padding: 60px 20px; text-align: center; width: 100%;
        }

        header h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem); font-weight: 800;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Контейнер поиска */
        .search-wrapper {
            position: relative;
            display: inline-flex;
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .search-area {
            display: flex; align-items: center;
            background: var(--glass);
            padding: 8px; border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            width: 100%;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 5;
        }

        @media (max-width: 480px) {
            .search-wrapper { flex-direction: column; gap: 15px; }
            .search-area { background: var(--glass); border: 1px solid var(--glass-border); }
        }

        /* Само поле ввода - ЧИСТОЕ И РАБОЧЕЕ */
        input {
            background: transparent;
            border: none;
            color: #ffffff !important;
            padding: 15px;
            font-size: 1.25rem;
            flex-grow: 1;
            outline: none;
            font-family: 'Courier New', monospace;
            width: 100%;
            position: relative;
            z-index: 20; /* Выше всех анимаций */
        }

        /* Кнопка */
        #sBtn {
            background: var(--primary);
            color: white; border: none;
            padding: 15px 35px; border-radius: 16px;
            font-weight: 700; cursor: pointer;
            transition: 0.3s;
            z-index: 20;
        }

        #sBtn:active { transform: scale(0.95); }

        @media (max-width: 480px) { #sBtn { width: 100%; } }

        /* Результаты и карточки */
        #results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; margin-top: 30px;
        }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 25px; text-align: left;
            backdrop-filter: blur(10px); opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card.visible { opacity: 1; transform: translateY(0) scale(1); }

        .answer-box {
            background: rgba(0,0,0,0.4); border-radius: 16px;
            padding: 15px; margin: 15px 0;
            display: flex; justify-content: space-between; align-items: center;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05); border: none;
            color: #94a3b8; padding: 10px; border-radius: 10px; cursor: pointer;
        }

        .loader {
            display: none; width: 45px; height: 45px;
            border: 4px solid var(--glass-border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s infinite linear;
            margin: 40px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <header>
            <h1>Intelligence System</h1>
            <p style="color: #94a3b8; margin-bottom: 20px;">Введите 8 цифр КИМ</p>
        </header>

        <div class="search-wrapper">
            <div class="search-area">
                <input type="text" id="vInput" placeholder="00000000" maxlength="8">
                <button id="sBtn">SCAN</button>
            </div>
        </div>

        <div id="loader" class="loader"></div>
        <div id="results"></div>
    </div>

    <script>
        const vInput = document.getElementById('vInput');
        const sBtn = document.getElementById('sBtn');
        const results = document.getElementById('results');
        const loader = document.getElementById('loader');

        // Оптимизированная анимация плейсхолдера (только когда нет текста)
        let placeholderTimer;
        function startPlaceholderAnim() {
            placeholderTimer = setInterval(() => {
                if (vInput.value === "" && document.activeElement !== vInput) {
                    vInput.placeholder = Array.from({length: 8}, () => Math.floor(Math.random() * 10)).join('');
                }
            }, 150);
        }
        startPlaceholderAnim();

        // Остановка анимации при фокусе для Samsung/Android фикса
        vInput.addEventListener('focus', () => {
            clearInterval(placeholderTimer);
            vInput.placeholder = "Введите КИМ";
        });

        vInput.addEventListener('blur', () => {
            if (vInput.value === "") startPlaceholderAnim();
        });

        // Жесткая фильтрация ввода: ТОЛЬКО цифры
        vInput.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        async function copyText(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const old = btn.innerHTML;
                btn.innerHTML = '✓';
                setTimeout(() => btn.innerHTML = old, 1500);
            } catch (err) {}
        }

        async function loadData() {
            const val = vInput.value.trim();
            if (val.length < 4) return;

            results.innerHTML = '';
            loader.style.display = 'block';
            vInput.blur(); // Закрыть клавиатуру

            try {
                const res = await fetch(`https://kompege.ru/api/v1/variant/kim/${val}`);
                const data = await res.json();
                loader.style.display = 'none';

                if (data.tasks) {
                    data.tasks.forEach((t, i) => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        const ans = t.key || '—';
                        card.innerHTML = `
                            <span style="font-size:0.7rem; color:var(--primary); font-weight:800">ЗАДАНИЕ #${i+1}</span>
                            <div class="answer-box">
                                <div style="font-family:monospace; font-size:1.2rem; font-weight:600">${ans}</div>
                                <button class="copy-btn">📑</button>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#475569">
                                ${t.video ? `<a href="https://youtu.be/${t.video}" target="_blank" style="color:#94a3b8; text-decoration:none">Разбор</a>` : '<span></span>'}
                                <span>ID: ${t.taskId}</span>
                            </div>
                        `;
                        card.querySelector('.copy-btn').onclick = () => copyText(ans, card.querySelector('.copy-btn'));
                        results.appendChild(card);
                        setTimeout(() => card.classList.add('visible'), i * 50);
                    });
                }
            } catch (e) {
                loader.style.display = 'none';
                results.innerHTML = '<p style="color:#f43f5e">Вариант не найден</p>';
            }
        }

        sBtn.onclick = loadData;
        vInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') loadData(); });
    </script>
</body>
</html>
